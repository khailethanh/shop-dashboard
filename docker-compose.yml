services:
  app:
    build: .
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
